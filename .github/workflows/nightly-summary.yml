name: Programmers Nightly Summary

on:
  schedule:
    - cron: "0 15 * * *"
  workflow_dispatch:

jobs:
  summary:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate secrets
        env:
          FRIENDS_JSON: ${{ secrets.FRIENDS_JSON }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "$FRIENDS_JSON" ]; then
            echo "::error::FRIENDS_JSON secret is not set"
            exit 1
          fi
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "::error::DISCORD_WEBHOOK_URL secret is not set"
            exit 1
          fi

      - name: Send nightly summary
        env:
          FRIENDS_JSON: ${{ secrets.FRIENDS_JSON }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python programmers_check.py summary
