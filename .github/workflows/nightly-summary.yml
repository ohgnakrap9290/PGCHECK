name: Programmers Nightly Summary

on:
  schedule:
    - cron: "0 15 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "요약할 KST 날짜입니다. 비우면 수동 실행은 오늘, 예약 실행은 전날을 요약합니다. 예: 2026-05-18"
        required: false
        type: string

jobs:
  summary:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate secrets
        env:
          FRIENDS_JSON: ${{ secrets.FRIENDS_JSON }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "$FRIENDS_JSON" ]; then
            echo "::error::FRIENDS_JSON secret is not set"
            exit 1
          fi
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "::error::DISCORD_WEBHOOK_URL secret is not set"
            exit 1
          fi

      - name: Send nightly summary
        env:
          FRIENDS_JSON: ${{ secrets.FRIENDS_JSON }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          SUMMARY_DATE: ${{ inputs.date }}
        run: |
          if [ -n "$SUMMARY_DATE" ]; then
            python programmers_check.py summary --date "$SUMMARY_DATE"
          elif [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            python programmers_check.py summary --date "$(TZ=Asia/Seoul date +%F)"
          else
            python programmers_check.py summary
          fi
