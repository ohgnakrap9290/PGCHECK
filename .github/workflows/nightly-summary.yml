name: Programmers Nightly Summary

on:
  schedule:
    - cron: "0 15 * * *"
    - cron: "10 15 * * *"
    - cron: "20 15 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "KST date to summarize. Empty means today for manual runs and yesterday for scheduled runs. Example: 2026-05-18"
        required: false
        type: string

permissions:
  contents: write

jobs:
  summary:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate secrets
        env:
          FRIENDS_JSON: ${{ secrets.FRIENDS_JSON }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "$FRIENDS_JSON" ]; then
            echo "::error::FRIENDS_JSON secret is not set"
            exit 1
          fi
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "::error::DISCORD_WEBHOOK_URL secret is not set"
            exit 1
          fi

      - name: Send nightly summary
        env:
          FRIENDS_JSON: ${{ secrets.FRIENDS_JSON }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GH_TOKEN: ${{ secrets.GH_TOKEN || github.token }}
          SUMMARY_DATE: ${{ inputs.date }}
        run: |
          if [ -n "$SUMMARY_DATE" ]; then
            python programmers_check.py summary --date "$SUMMARY_DATE"
          elif [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            python programmers_check.py summary --date "$(TZ=Asia/Seoul date +%F)"
          else
            python programmers_check.py summary --once
          fi

      - name: Commit summary state
        if: github.event_name == 'schedule'
        shell: bash
        run: |
          if [ -z "$(git status --porcelain -- .state/sent_summaries.json .state/commit_languages.json)" ]; then
            echo "No summary state changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .state/sent_summaries.json .state/commit_languages.json
          git commit -m "Update sent summaries state"
          git push
