name: Programmers Commit Poll

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: programmers-commit-poll
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate secrets
        env:
          FRIENDS_JSON: ${{ secrets.FRIENDS_JSON }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "$FRIENDS_JSON" ]; then
            echo "::error::FRIENDS_JSON secret is not set"
            exit 1
          fi
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "::error::DISCORD_WEBHOOK_URL secret is not set"
            exit 1
          fi

      - name: Poll commits
        env:
          FRIENDS_JSON: ${{ secrets.FRIENDS_JSON }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python programmers_check.py poll

      - name: Commit state
        shell: bash
        run: |
          if [ -z "$(git status --porcelain -- .state/seen_commits.json .state/ranking_message.json)" ]; then
            echo "No state changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .state/seen_commits.json .state/ranking_message.json
          git commit -m "Update seen commits state"
          git push
